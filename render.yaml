services:
  - type: web
    name: hybrid-router-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/main.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: FIREWORKS_API_KEY
        sync: false
      - key: FIREWORKS_BASE_URL
        value: "https://api.fireworks.ai/inference/v1"
      - key: ALLOWED_MODELS
        value: "accounts/fireworks/models/minimax-m3,accounts/fireworks/models/kimi-k2p7-code,accounts/fireworks/models/gemma-4-31b-it,accounts/fireworks/models/gemma-4-26b-a4b-it,accounts/fireworks/models/gemma-4-31b-it-nvfp4"
      - key: LOCAL_MODEL_ENABLED
        value: "false"
